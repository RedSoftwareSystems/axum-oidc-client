# docker-compose.redis.yml — Redis 7 + api-server + www-server
#
# Services
# ────────
#   redis      – Redis 7 Alpine tuned for an ephemeral session / PKCE-verifier
#                cache (high-churn, short-TTL data, no persistence required).
#   api-server – JWT-validated API server (internal only, port 8181).
#   www-server – OAuth2 / OIDC front-end, exposed on host port 8080.
#                Uses Redis as the session-cache backend (cache-l2 or cache-l1-l2).
#
# Why no sidecar cron?
# ────────────────────
#   Redis manages its own memory automatically.  The `maxmemory` +
#   `maxmemory-policy allkeys-lru` settings below ensure Redis evicts the
#   least-recently-used keys when the memory ceiling is reached, so expired
#   session entries are reclaimed without any external maintenance job.
#   A scheduled VACUUM / OPTIMIZE equivalent is not needed.
#
# Quick start
# ───────────
#   cp .env.redis.example .env.local
#   # edit .env.local with real OAuth2 credentials
#   docker compose -f ../docker/docker-compose.redis.yml up -d
#
#   # Run with Redis-only cache
#   make run-redis
#   # or: cargo run --no-default-features --features cache-l2
#
#   # Run with two-tier Moka L1 + Redis L2 cache (recommended)
#   make run-l1-redis
#   # or: cargo run --no-default-features --features cache-l1-l2
#
# Environment variables (override in .env.local or shell)
# ────────────────────────────────────────────────────────
#   REDIS_PORT      – host-side port mapping          (default: 6379)
#   REDIS_PASSWORD  – optional AUTH password          (default: empty / no auth)
#                     Set to a non-empty value to enable Redis AUTH.
#                     When set, use redis://:<password>@localhost:<port>/ as REDIS_URL.
#   REDIS_MAXMEMORY – memory ceiling for the cache    (default: 256mb)
#                     Redis evicts LRU keys when this limit is reached.
#
# Application environment variables (set in shared .env.local / DOTENV_FILE)
# ────────────────────────────────────────────────────────────────────────────
#   OAUTH_ISSUER              – OIDC issuer URL (used by both servers)
#   OAUTH_CLIENT_ID           – OAuth2 client ID (www-server)
#   OAUTH_CLIENT_SECRET       – OAuth2 client secret (www-server)
#   OAUTH_REDIRECT_URI        – callback URI (www-server)
#   PRIVATE_COOKIE_KEY        – session encryption key (www-server)
#   REDIS_URL                 – Redis connection URL (default: redis://redis:6379/)
#   CACHE_TTL                 – session TTL in seconds (default: 3600)
#   WWW_FEATURES              – cache feature compiled into www-server image
#                               (default: cache-l1-l2 — Moka L1 + Redis L2)

name: axum-oidc-redis

# ─── Shared application environment ──────────────────────────────────────────
# Common OIDC / OAuth2 variables read by both application services.
# Values are resolved from the shell environment or the --env-file passed to
# `docker compose`.  Secrets should never be hard-coded here.
x-app-env: &app-env
  OAUTH_ISSUER: ${OAUTH_ISSUER:-}
  OAUTH_CLIENT_ID: ${OAUTH_CLIENT_ID:-}
  OAUTH_CLIENT_SECRET: ${OAUTH_CLIENT_SECRET:-}
  OAUTH_REDIRECT_URI: ${OAUTH_REDIRECT_URI:-http://localhost:8080/auth/callback}
  PRIVATE_COOKIE_KEY: ${PRIVATE_COOKIE_KEY:-change-me-in-production}

services:

  # ── Redis 7 ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: oidc-redis

    # Redis runtime parameters
    # ─────────────────────────
    # Passed via the `redis-server` command so no redis.conf volume is needed.
    #
    # Key parameters for a session cache workload:
    #
    #   maxmemory                – hard ceiling on Redis memory usage.
    #                              256 MB is generous for a session-only cache.
    #                              Tune down for memory-constrained environments.
    #
    #   maxmemory-policy         – eviction policy when maxmemory is reached.
    #                              allkeys-lru evicts the least-recently-used key
    #                              across ALL keys (not just those with a TTL).
    #                              This is the safest policy for a cache where
    #                              every key has an explicit TTL set by the app.
    #
    #   maxmemory-samples        – number of keys sampled per LRU eviction pass.
    #                              10 gives near-perfect LRU accuracy at minimal
    #                              CPU cost.  Default is 5.
    #
    #   save                     – disabled ("") to skip RDB snapshots.
    #                              Session data is ephemeral; durability is not
    #                              required and snapshots add unnecessary I/O.
    #
    #   appendonly               – disabled for the same reason: AOF persistence
    #                              is unnecessary for a short-TTL session cache.
    #
    #   hz                       – background task frequency (default: 10 Hz).
    #                              20 Hz means Redis checks for expired keys and
    #                              runs LRU eviction twice as often, which keeps
    #                              memory usage tighter under bursty expiry waves.
    #
    #   tcp-keepalive            – send TCP keepalives every 60 s.  Keeps idle
    #                              multiplexed connections from being dropped by
    #                              NAT gateways or load balancers.
    #
    #   loglevel                 – "notice" suppresses verbose debug output while
    #                              still logging important events (start, shutdown,
    #                              config changes).
    command: >
      redis-server
        --maxmemory            ${REDIS_MAXMEMORY:-256mb}
        --maxmemory-policy     allkeys-lru
        --maxmemory-samples    10
        --save                 ""
        --appendonly           no
        --hz                   20
        --tcp-keepalive        60
        --loglevel             notice
        ${REDIS_PASSWORD:+--requirepass "${REDIS_PASSWORD}"}

    ports:
      - "${REDIS_PORT:-6379}:6379"

    volumes:
      # Named volume keeps the socket and runtime files tidy.
      # Because persistence is disabled, no data survives a container restart —
      # which is intentional for an ephemeral session cache.
      - redis_data:/data

    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

    networks:
      - oidc-redis-net

  # ── api-server ────────────────────────────────────────────────────────────────
  #
  # JWT-validated API server.  Validates Bearer tokens issued by the OIDC
  # provider specified in OAUTH_ISSUER.  Not exposed to the host — reachable
  # only from www-server via the internal oidc-redis-net network.
  api-server:
    build:
      # Build context must be the repository root so the workspace path
      # `path = "../.."` in Cargo.toml resolves correctly.
      context: ../..
      dockerfile: examples/api-server/Dockerfile
    image: axum-api-server:latest
    container_name: oidc-api-server

    environment:
      <<: *app-env
      SERVER_HOST: "0.0.0.0"
      SERVER_PORT: "8181"

    # No host-port mapping — the service is intentionally internal only.
    expose:
      - "8181"

    healthcheck:
      test: [ "CMD-SHELL", "curl -sf http://localhost:8181/health || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

    networks:
      - oidc-redis-net

  # ── www-server ────────────────────────────────────────────────────────────────
  #
  # OAuth2 / OIDC front-end.  Uses Redis as the session-cache backend.
  # Exposed on host port 8080 — the only service reachable from outside.
  www-server:
    build:
      context: ../..
      dockerfile: examples/www-server/Dockerfile
      args:
        # Build with Moka L1 + Redis L2 two-tier cache by default.
        # Override: WWW_FEATURES=cache-l2 docker compose up --build
        FEATURES: ${WWW_FEATURES:-cache-l1-l2}
    image: axum-www-server:redis-latest
    container_name: oidc-www-server

    environment:
      <<: *app-env
      SERVER_HOST: "0.0.0.0"
      SERVER_PORT: "8080"
      # Point www-server's reverse proxy at the api-server service name.
      API_SERVER: "http://api-server:8181"
      # Redis session cache — uses the internal service name.
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/}
      CACHE_TTL: ${CACHE_TTL:-3600}

    ports:
      - "${WWW_PORT:-8080}:8080"

    depends_on:
      redis:
        condition: service_healthy
      api-server:
        condition: service_started

    healthcheck:
      test: [ "CMD-SHELL", "curl -sf http://localhost:8080/health || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 25s

    networks:
      - oidc-redis-net

# ─── Named volumes ────────────────────────────────────────────────────────────
volumes:
  redis_data:
    driver: local

# ─── Networks ─────────────────────────────────────────────────────────────────
networks:
  oidc-redis-net:
    driver: bridge
