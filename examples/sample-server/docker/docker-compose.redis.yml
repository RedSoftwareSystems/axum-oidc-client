# docker-compose.redis.yml — Redis 7 for axum-oidc-client sample-server
#
# Services
# ────────
#   redis – Redis 7 Alpine tuned for an ephemeral session / PKCE-verifier
#           cache (high-churn, short-TTL data, no persistence required).
#
# Why no sidecar cron?
# ────────────────────
#   Redis manages its own memory automatically.  The `maxmemory` +
#   `maxmemory-policy allkeys-lru` settings below ensure Redis evicts the
#   least-recently-used keys when the memory ceiling is reached, so expired
#   session entries are reclaimed without any external maintenance job.
#   A scheduled VACUUM / OPTIMIZE equivalent is not needed.
#
# Quick start
# ───────────
#   cp .env.redis.example .env.local
#   # edit .env.local with real OAuth2 credentials
#   docker compose -f docker/docker-compose.redis.yml up -d
#
#   # Run with Redis-only cache
#   make run-redis
#   # or: cargo run --no-default-features --features cache-l2
#
#   # Run with two-tier Moka L1 + Redis L2 cache (recommended)
#   make run-l1-redis
#   # or: cargo run --no-default-features --features cache-l1-l2
#
# Environment variables (override in .env.local or shell)
# ────────────────────────────────────────────────────────
#   REDIS_PORT      – host-side port mapping          (default: 6379)
#   REDIS_PASSWORD  – optional AUTH password          (default: empty / no auth)
#                     Set to a non-empty value to enable Redis AUTH.
#                     When set, use redis://:<password>@localhost:<port>/ as REDIS_URL.
#   REDIS_MAXMEMORY – memory ceiling for the cache    (default: 256mb)
#                     Redis evicts LRU keys when this limit is reached.

name: axum-oidc-redis

services:

  # ── Redis 7 ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: oidc-redis
    restart: unless-stopped

    # Redis runtime parameters
    # ─────────────────────────
    # Passed via the `redis-server` command so no redis.conf volume is needed.
    #
    # Key parameters for a session cache workload:
    #
    #   maxmemory                – hard ceiling on Redis memory usage.
    #                              256 MB is generous for a session-only cache.
    #                              Tune down for memory-constrained environments.
    #
    #   maxmemory-policy         – eviction policy when maxmemory is reached.
    #                              allkeys-lru evicts the least-recently-used key
    #                              across ALL keys (not just those with a TTL).
    #                              This is the safest policy for a cache where
    #                              every key has an explicit TTL set by the app.
    #
    #   maxmemory-samples        – number of keys sampled per LRU eviction pass.
    #                              10 gives near-perfect LRU accuracy at minimal
    #                              CPU cost.  Default is 5.
    #
    #   save                     – disabled ("") to skip RDB snapshots.
    #                              Session data is ephemeral; durability is not
    #                              required and snapshots add unnecessary I/O.
    #
    #   appendonly               – disabled for the same reason: AOF persistence
    #                              is unnecessary for a short-TTL session cache.
    #
    #   hz                       – background task frequency (default: 10 Hz).
    #                              20 Hz means Redis checks for expired keys and
    #                              runs LRU eviction twice as often, which keeps
    #                              memory usage tighter under bursty expiry waves.
    #
    #   tcp-keepalive            – send TCP keepalives every 60 s.  Keeps idle
    #                              multiplexed connections from being dropped by
    #                              NAT gateways or load balancers.
    #
    #   loglevel                 – "notice" suppresses verbose debug output while
    #                              still logging important events (start, shutdown,
    #                              config changes).
    command: >
      redis-server
        --maxmemory            ${REDIS_MAXMEMORY:-256mb}
        --maxmemory-policy     allkeys-lru
        --maxmemory-samples    10
        --save                 ""
        --appendonly           no
        --hz                   20
        --tcp-keepalive        60
        --loglevel             notice
        ${REDIS_PASSWORD:+--requirepass "${REDIS_PASSWORD}"}

    ports:
      - "${REDIS_PORT:-6379}:6379"

    volumes:
      # Named volume keeps the socket and runtime files tidy.
      # Because persistence is disabled, no data survives a container restart —
      # which is intentional for an ephemeral session cache.
      - redis_data:/data

    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

    networks:
      - oidc-redis-net

# ─── Named volumes ────────────────────────────────────────────────────────────
volumes:
  redis_data:
    driver: local

# ─── Networks ─────────────────────────────────────────────────────────────────
networks:
  oidc-redis-net:
    driver: bridge
