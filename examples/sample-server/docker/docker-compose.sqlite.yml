# docker-compose.sqlite.yml — SQLite volume + maintenance cron for axum-oidc-client sample-server
#
# Services
# ────────
#   sqlite-vacuum-cron – A lightweight Alpine-based container that runs
#                        `VACUUM` and `PRAGMA optimize` against the SQLite
#                        database file every day at midnight (UTC by default).
#
#                        Why both?
#                        • VACUUM          – rewrites the database into a new
#                          compacted file, returning all free pages (left by
#                          DELETE operations) to the OS.  SQLite does not have
#                          a background purge thread — free pages accumulate
#                          until VACUUM runs.
#                        • PRAGMA optimize – SQLite's lightweight equivalent of
#                          ANALYZE.  Refreshes query-planner statistics for any
#                          table whose statistics are stale, without rewriting
#                          the database file.  Keeps the planner accurate after
#                          large expiry waves.
#
#   sqlite-tools       – A minimal Alpine container with the sqlite package
#                        installed.  Used exclusively by `make sqlite-shell` to
#                        open an interactive sqlite3 session against the cache
#                        database file.  It does NOT run persistently —
#                        `docker compose run --rm` starts and removes it on
#                        demand.
#
# Why a Compose file for SQLite?
# ──────────────────────────────
#   SQLite is a file-based database — there is no server process to manage.
#   This Compose file exists to:
#     1. Define the `sqlite_data` named volume that persists the database file
#        across container and host restarts.
#     2. Run the `sqlite-vacuum-cron` sidecar for scheduled maintenance.
#     3. Provide the `sqlite-tools` one-shot service so `make sqlite-shell`
#        gives an interactive sqlite3 REPL without requiring sqlite3 to be
#        installed on the host.
#
#   The sample-server binary connects directly to the SQLite file via sqlx
#   using the path mounted from the `sqlite_data` volume.
#
# Quick start
# ───────────
#   # 1. Start the volume + vacuum-cron sidecar
#   make sqlite-up
#
#   # 2. Add the SQLite URL to your .env.local
#   echo "SQLITE_URL=sqlite:////data/oidc_cache.db" >> .env.local
#
#   # 3. Run the server (SQLite-only cache)
#   make run-sqlite
#   # or: cargo run --no-default-features --features cache-sqlite
#
#   # 4. (Optional) Open an interactive sqlite3 shell
#   make sqlite-shell
#
#   # 5. (Optional) Run VACUUM + PRAGMA optimize manually
#   make sqlite-vacuum
#
# Environment variables (override in .env.local or shell)
# ────────────────────────────────────────────────────────
#   SQLITE_DB_PATH   – absolute path to the database file inside the container
#                      (default: /data/oidc_cache.db)
#   VACUUM_SCHEDULE  – cron expression for the vacuum job (default: 0 0 * * *)
#                      Override to test more frequently: "*/5 * * * *"
#
# No database credentials are required — SQLite uses filesystem permissions.

name: axum-oidc-sqlite

services:

  # ── sqlite-vacuum-cron ────────────────────────────────────────────────────────
  #
  # Runs VACUUM + PRAGMA optimize on a schedule to keep the database file
  # compact and the query planner statistics fresh.
  #
  # Why a separate container rather than a host cron job?
  #   • Keeps all maintenance logic self-contained and version-controlled
  #     alongside the rest of the stack.
  #   • Observable via `docker compose logs sqlite-vacuum-cron`.
  #   • Portable — works the same way on any host that runs Docker.
  #   • VACUUM acquires an EXCLUSIVE lock for its duration; running it from a
  #     separate container makes the maintenance window explicit and observable.
  sqlite-vacuum-cron:
    build:
      context: ./sqlite-vacuum-cron
      dockerfile: Dockerfile
    container_name: oidc-sqlite-vacuum-cron
    restart: unless-stopped

    environment:
      SQLITE_DB_PATH: ${SQLITE_DB_PATH:-/data/oidc_cache.db}
      # 5-field cron expression: minute hour dom month dow
      # Default: every day at midnight UTC
      VACUUM_SCHEDULE: ${VACUUM_SCHEDULE:-0 0 * * *}

    volumes:
      # Mount the same named volume the sample-server writes to so the
      # vacuum job operates on the live database file.
      - sqlite_data:/data

    networks:
      - oidc-sqlite-net

  # ── sqlite-tools (one-shot helper) ───────────────────────────────────────────
  #
  # This service is NOT started by `docker compose up`.  It is invoked on demand
  # via `docker compose run --rm sqlite-tools sqlite3 /data/oidc_cache.db`.
  #
  # The Alpine `sqlite` package provides the sqlite3 CLI tool (~900 KB).
  # No entrypoint is set so the service can be used as a general-purpose
  # sqlite3 wrapper for any command the operator needs to run.
  sqlite-tools:
    image: alpine:3.21
    container_name: oidc-sqlite-tools
    # Install sqlite3 at runtime to keep the image declaration simple.
    # Alpine's package cache is cleared to keep the layer small.
    entrypoint: >
      sh -c "apk add --no-cache sqlite && exec \"$@\"" --
    volumes:
      # Mount the named volume at /data so sqlite3 can open the cache file.
      - sqlite_data:/data
    networks:
      - oidc-sqlite-net
    # Prevent this service from starting as part of `docker compose up -d`.
    profiles:
      - tools

# ─── Named volumes ────────────────────────────────────────────────────────────
volumes:
  sqlite_data:
    driver: local

# ─── Networks ─────────────────────────────────────────────────────────────────
# A bridge network is defined so sqlite-vacuum-cron and sqlite-tools share the
# same compose namespace.  No TCP connections are made — both containers access
# SQLite purely through the shared sqlite_data volume.
networks:
  oidc-sqlite-net:
    driver: bridge
